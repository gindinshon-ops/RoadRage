<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reaction Time Scoreboard</title>

  <link rel="stylesheet" href="scoreboard.css" />
</head>

<body>
  <main class="scoreboard-container">
    <h1>Reaction Time Scoreboard</h1>

    <p id="ScoreboardMessage">
      Loading scores...
    </p>

    <table id="ScoreboardTable">
      <thead>
        <tr>
          <th>Place</th>
          <th>Username</th>
          <th>Best Time</th>
        </tr>
      </thead>

      <tbody id="ScoreboardBody">
      </tbody>
    </table>

   <button id="backBtn"> back to main </button>
    <button id="gameBtn"> Game </button>
  </main>

  <script
    type="module"
    src="scoreboard.js"
  ></script>
</body>
</html>
